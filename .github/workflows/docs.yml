name: Documentation

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - 'xraylabtool/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'pyproject.toml'
      - '.github/workflows/docs*.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'xraylabtool/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'pyproject.toml'
      - '.github/workflows/docs*.yml'

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHONUNBUFFERED: 1
  PYTHONDONTWRITEBYTECODE: 1
  PIP_DISABLE_PIP_VERSION_CHECK: 1
  PIP_NO_PYTHON_VERSION_WARNING: 1
  PIP_PREFER_BINARY: 1

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      build-success: ${{ steps.build.outcome }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Set up Python 3.13
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'

    - name: Set up uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

    - name: Cache documentation dependencies
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          ~/.cache/uv
          docs/_build/.doctrees
          docs/_build/.buildinfo
          ~/.cache/sphinx
        key: docs-deps-v5-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'docs/conf.py', 'docs/**/*.rst') }}
        restore-keys: |
          docs-deps-v5-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          docs-deps-v5-${{ runner.os }}-

    - name: Install pandoc
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq pandoc

    - name: Install documentation dependencies
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      with:
        timeout_minutes: 8
        max_attempts: 3
        retry_on: error
        command: |
          uv pip install --system -e .

    - name: Validate documentation structure
      run: |
        echo "Validating documentation structure..."

        required_files=(
          "docs/index.rst"
          "docs/api/index.rst"
          "docs/conf.py"
        )

        for file in "${required_files[@]}"; do
          if [[ ! -f "$file" ]]; then
            echo "Missing required file: $file"
            exit 1
          fi
        done

        echo "Documentation structure validated"

    - name: Build Sphinx documentation with error handling
      id: build
      run: |
        echo "Building Sphinx documentation..."

        if sphinx-build -W --keep-going -b html docs docs/_build/html; then
          echo "Documentation built successfully"
          echo "BUILD_STATUS=success" >> $GITHUB_ENV
        else
          echo "Documentation build completed with warnings/errors"
          echo "BUILD_STATUS=warning" >> $GITHUB_ENV

          echo "Attempting build without strict warnings..."
          sphinx-build --keep-going -b html docs docs/_build/html || {
            echo "Documentation build failed completely"
            echo "BUILD_STATUS=failure" >> $GITHUB_ENV
            exit 1
          }
        fi

    - name: Check documentation coverage
      run: |
        echo "Checking documentation coverage..."
        sphinx-build -b coverage docs docs/_build/coverage || {
          echo "Coverage check failed, continuing..."
        }

        if [[ -f "docs/_build/coverage/python.txt" ]]; then
          echo "Documentation Coverage Report:"
          head -20 docs/_build/coverage/python.txt
        else
          echo "No coverage report generated"
        fi
      continue-on-error: true

    - name: Generate documentation statistics
      run: |
        echo "Documentation Statistics:"

        if [[ -d "docs/_build/html" ]]; then
          echo "HTML files generated: $(find docs/_build/html -name "*.html" | wc -l)"
          echo "Total file size: $(du -sh docs/_build/html | cut -f1)"

          broken_links=$(find docs/_build/html -name "*.html" -exec grep -l "404.html\|broken\|missing" {} \; 2>/dev/null | wc -l)
          echo "Potential broken internal links: $broken_links"
        fi

    - name: Upload documentation artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: documentation-html
        path: docs/_build/html/
        retention-days: 30

    - name: Upload build logs
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: failure()
      with:
        name: documentation-build-logs
        path: |
          docs/_build/
          !docs/_build/html/
        retention-days: 7

  test-examples:
    name: Test Documentation Examples
    needs: build-docs
    runs-on: ubuntu-latest
    timeout-minutes: 12
    if: needs.build-docs.outputs.build-success != 'failure'

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Set up Python 3.13
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'

    - name: Set up uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

    - name: Cache documentation dependencies
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          ~/.cache/uv
          docs/_build/.doctrees
          docs/_build/.buildinfo
          ~/.cache/sphinx
        key: docs-deps-v5-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'docs/conf.py', 'docs/**/*.rst') }}
        restore-keys: |
          docs-deps-v5-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          docs-deps-v5-${{ runner.os }}-

    - name: Install documentation dependencies
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      with:
        timeout_minutes: 8
        max_attempts: 3
        retry_on: error
        command: |
          uv pip install --system -e .

    - name: Run doctest with error collection
      run: |
        echo "Running doctest examples..."

        if sphinx-build -b doctest docs docs/_build/doctest 2>&1 | tee doctest.log; then
          echo "All doctests passed"
          DOCTEST_STATUS="success"
        else
          echo "Some doctests failed"
          DOCTEST_STATUS="warning"
        fi

        if [[ -f "doctest.log" ]]; then
          failed_tests=$(grep -c "FAILED" doctest.log || echo "0")
          passed_tests=$(grep -c "trying\|ok" doctest.log || echo "0")
          echo "Doctest Results: $passed_tests passed, $failed_tests failed"
        fi

        echo "DOCTEST_STATUS=$DOCTEST_STATUS" >> $GITHUB_ENV
      continue-on-error: true

    - name: Test README examples
      run: |
        echo "Testing README code examples..."

        python -c "
        import re
        import subprocess
        import tempfile
        import os

        with open('README.md', 'r') as f:
            content = f.read()

        code_blocks = re.findall(r'\x60\x60\x60python\n(.*?)\n\x60\x60\x60', content, re.DOTALL)

        failed_blocks = 0
        total_blocks = len(code_blocks)

        print(f'Found {total_blocks} Python code blocks in README')

        for i, code in enumerate(code_blocks, 1):
            if not any(keyword in code for keyword in ['calculate', 'xraylabtool', 'result']):
                continue

            try:
                with tempfile.NamedTemporaryFile(mode='w', suffix='.py', delete=False) as f:
                    f.write(code)
                    temp_file = f.name

                result = subprocess.run(['python', '-m', 'py_compile', temp_file],
                                       capture_output=True, text=True)
                if result.returncode == 0:
                    print(f'Code block {i}: Syntax valid')
                else:
                    print(f'Code block {i}: Syntax error')
                    print(result.stderr)
                    failed_blocks += 1

                os.unlink(temp_file)

            except Exception as e:
                print(f'Code block {i}: Could not test - {e}')

        if failed_blocks == 0:
            print('All testable README examples have valid syntax')
        else:
            print(f'{failed_blocks} README examples have syntax issues')
        "
      continue-on-error: true

    - name: Upload doctest results
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: doctest-results
        path: |
          docs/_build/doctest/
          doctest.log
        retention-days: 7

  check-links:
    name: Check External Links
    needs: build-docs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Set up Python 3.13
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'

    - name: Set up uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

    - name: Cache documentation dependencies
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: |
          ~/.cache/uv
          docs/_build/.doctrees
          docs/_build/.buildinfo
          ~/.cache/sphinx
        key: docs-deps-v5-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'docs/conf.py', 'docs/**/*.rst') }}
        restore-keys: |
          docs-deps-v5-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          docs-deps-v5-${{ runner.os }}-

    - name: Install documentation dependencies
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      with:
        timeout_minutes: 8
        max_attempts: 3
        retry_on: error
        command: |
          uv pip install --system -e .

    - name: Check external links with timeout
      run: |
        echo "Checking external links..."

        timeout 8m sphinx-build -b linkcheck docs docs/_build/linkcheck || {
          echo "Link checking timed out or found issues"
          echo "This is non-blocking for documentation builds"
        }

        if [[ -f "docs/_build/linkcheck/output.txt" ]]; then
          echo "Link Check Summary:"
          grep -E "(broken|working|redirected)" docs/_build/linkcheck/output.txt | head -10
        fi
      continue-on-error: true

    - name: Upload linkcheck results
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      if: always()
      with:
        name: linkcheck-results
        path: docs/_build/linkcheck/
        retention-days: 7

  quality-checks:
    name: Documentation Quality
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 1

    - name: Set up Python 3.13
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: '3.13'

    - name: Set up uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

    - name: Cache quality tools
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.cache/uv
        key: doc-quality-tools-${{ runner.os }}-doc8-rstcheck
        restore-keys: |
          doc-quality-tools-${{ runner.os }}-

    - name: Install quality tools
      uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
      with:
        timeout_minutes: 5
        max_attempts: 3
        retry_on: error
        command: |
          uv pip install --system doc8 rstcheck[sphinx] restructuredtext-lint

    - name: Check RST syntax and style
      run: |
        echo "Checking RST syntax and style..."

        find docs -name "*.rst" -exec rstcheck --report-level warning {} \; || {
          echo "RST syntax issues found, but continuing..."
        }

        doc8 docs \
          --ignore-path docs/_build \
          --max-line-length 100 \
          --ignore D001 || {
          echo "Documentation style issues found, but continuing..."
        }

        echo "Quality checks completed"
      continue-on-error: true

    - name: Check for documentation completeness
      run: |
        echo "Checking documentation completeness..."

        if grep -r "TODO\|FIXME\|XXX" docs/ --include="*.rst" --include="*.md"; then
          echo "Found TODO/FIXME items in documentation"
        else
          echo "No TODO/FIXME items found"
        fi

        broken_refs=$(grep -r ":ref:\|:doc:" docs/ --include="*.rst" | wc -l)
        echo "Cross-references found: $broken_refs"
      continue-on-error: true


  status-check:
    name: Documentation Status
    if: always()
    needs: [build-docs, test-examples, quality-checks]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - name: Check documentation status
      run: |
        echo "Documentation Build: ${{ needs.build-docs.result }}"
        echo "Example Tests: ${{ needs.test-examples.result }}"
        echo "Quality Checks: ${{ needs.quality-checks.result }}"

        if [[ "${{ needs.build-docs.result }}" == "failure" ]]; then
          echo "Documentation build failed"
          exit 1
        elif [[ "${{ needs.build-docs.result }}" == "success" ]]; then
          echo "Documentation pipeline completed successfully"
        else
          echo "Documentation completed with warnings"
        fi

    - name: Summary
      run: |
        echo "Documentation Pipeline Summary:"
        echo "- Build: ${{ needs.build-docs.result }}"
        echo "- Tests: ${{ needs.test-examples.result }}"
        echo "- Quality: ${{ needs.quality-checks.result }}"
