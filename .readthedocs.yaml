# ReadTheDocs configuration file for XRayLabTool
# See https://docs.readthedocs.io/en/stable/config-file/v2.html for details

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  commands:
    - asdf plugin add uv
    - asdf install uv latest
    - asdf global uv latest
    - uv pip install --system -e .
    - uv pip install --system sphinx furo sphinx-autodoc-typehints sphinx-copybutton sphinx-design sphinx-tabs sphinx-togglebutton myst-parser
    - python -m sphinx -b html docs/ $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

formats:
  - pdf
  - epub

search:
  ranking:
    guides/getting_started.html: 10
    guides/cli_reference.html: 5
    guides/completion_guide.html: 3
    examples/: 4
    api/: -1
  ignore:
    - "_build"
    - "*.js"
    - "*.css"

submodules:
  include: []
