# Pre-commit configuration for XRayLabTool (2026)
# Optimized for fast execution with latest tool versions; Python >=3.13, uv preferred for environment setup.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']
        exclude: ^graphify-out/
      - id: debug-statements

  # Use Ruff for fast linting and formatting (replaces multiple tools)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff
        name: ruff lint
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.3
    hooks:
      - id: gitleaks



# Configuration
default_language_version:
  python: python3

default_stages: [pre-commit]
fail_fast: false

exclude: |
  (?x)^(
    \.git/|
    \.tox/|
    \.venv/|
    venv/|
    \.eggs/|
    \.pytest_cache/|
    __pycache__/|
    \.coverage|
    htmlcov/|
    \.mypy_cache/|
    \.ruff_cache/|
    build/|
    dist/|
    .*\.egg-info/
  )
